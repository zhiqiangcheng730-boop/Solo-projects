version: "3.8"

services:
  backend:
    build: ./backend
    container_name: cityradar-backend
    ports:
      - "8001:8000"
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/city_radar.db
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: cityradar-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
