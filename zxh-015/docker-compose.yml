services:
  backend:
    build: ./backend
    container_name: timebank-backend
    ports:
      - "8002:8000"
    volumes:
      - ./backend:/app
      - timebank_data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/timebank.db
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: timebank-frontend
    ports:
      - "3002:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  timebank_data:
